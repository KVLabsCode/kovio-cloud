app = "kovio-api"
primary_region = "iad"

[build]

[env]
  KOVIO_ENVIRONMENT = "production"
  KOVIO_PORT = "8080"
  # Public project URL — used to derive the JWKS endpoint for ES256 session-token
  # verification. Not a secret (it's also embedded in the frontend).
  KOVIO_SUPABASE_URL = "https://aoohvwipphkwroymarqm.supabase.co"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Secrets (set out-of-band, never committed):
#   fly secrets set KOVIO_DATABASE_URL="$(grep KOVIO_DATABASE_URL .env.production | cut -d= -f2-)"
#   fly secrets set KOVIO_KEY_PEPPER="$(grep KOVIO_KEY_PEPPER .env.production | cut -d= -f2-)"
