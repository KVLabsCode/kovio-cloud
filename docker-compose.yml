services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kovio
      POSTGRES_PASSWORD: kovio
      POSTGRES_DB: kovio
    ports:
      - "5432:5432"
    volumes:
      - kovio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kovio -d kovio"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KOVIO_DATABASE_URL: postgresql+asyncpg://kovio:kovio@db:5432/kovio
      KOVIO_DEV_AUTO_CREATE_TABLES: "true"
      KOVIO_ENVIRONMENT: dev
      KOVIO_KEY_PEPPER: kovio-dev-pepper-change-in-prod
      KOVIO_SUPABASE_JWT_SECRET: local-test-secret

volumes:
  kovio_pgdata:
